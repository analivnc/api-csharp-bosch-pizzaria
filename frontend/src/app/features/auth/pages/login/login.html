<div class="login-page">
  <div class="login-card">
    <img src="../../../../assets/snoop.png" alt="">
    <h1>Bosch Pizza</h1>
    <p>Acesse o sistema</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Usuário</label>
        <input type="text" formControlName="username" placeholder="Digite seu usuário" />
      </div>

      <div class="field">
        <label>Senha</label>
        <input type="password" formControlName="password" placeholder="Digite sua senha" />
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>

      <br>
      <br>
      
      <button (click)="goToRegister()">Criar conta</button>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>
  </div>
</div>
