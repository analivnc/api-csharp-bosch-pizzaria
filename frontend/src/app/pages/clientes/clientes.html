<section class="page">
  <div class="form-card">
    <h2>{{ editando ? 'Editar cliente' : 'Novo cliente' }}</h2>

    <form [formGroup]="form" (ngSubmit)="salvar()">

      <div class="field">
        <label>Nome</label>
        <input type="text" formControlName="nome" placeholder="Digite o nome" />
      </div>

      <div class="field">
        <label>Endereço</label>
        <input type="text" formControlName="endereco" placeholder="Digite o endereço" />
      </div>

      <div class="field">
        <label>Telefone</label>
        <input type="text" formControlName="telefone" placeholder="Digite o telefone" />
      </div>

      <div class="actions">
        <button type="submit">
          {{ editando ? 'Atualizar' : 'Salvar' }}
        </button>

        <button type="button" (click)="cancelar()">Cancelar</button>
      </div>

    </form>
  </div>
</section>
